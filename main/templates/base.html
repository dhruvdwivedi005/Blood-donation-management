<!DOCTYPE html>
<html>
<head>
    <title>Blood Management System</title>

    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#b91c1c',
                        secondary: '#991b1b'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 font-sans min-h-screen">

<!-- NAVBAR -->
<nav class="bg-primary text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-2xl font-bold flex items-center">
            <i class="fas fa-tint text-red-300 mr-2"></i>
            BloodBank
        </h1>

        <div class="space-x-6 flex items-center">

        {% if request.session.role == 'user' %}

            <a href="/user-dashboard/" class="hover:text-red-200 transition duration-200 {% if request.path == '/user-dashboard/' %}font-semibold{% endif %}">Dashboard</a>
            <a href="/my-requests/" class="hover:text-red-200 transition duration-200 {% if request.path == '/my-requests/' %}font-semibold{% endif %}">My Requests</a>
            <a href="/my-donations/" class="hover:text-red-200 transition duration-200 {% if request.path == '/my-donations/' %}font-semibold{% endif %}">My Donations</a>
            <a href="/logout/" class="hover:text-red-200 transition duration-200">Logout</a>

        {% elif request.session.role == 'hospital' %}

            <a href="/hospital-dashboard/" class="hover:text-red-200 transition duration-200 {% if request.path == '/hospital-dashboard/' %}font-semibold{% endif %}">Dashboard</a>
            <a href="/logout/" class="hover:text-red-200 transition duration-200">Logout</a>

        {% else %}

            <a href="/login/" class="hover:text-red-200 transition duration-200 {% if request.path == '/login/' %}font-semibold{% endif %}">Login</a>
            <a href="/signup/" class="hover:text-red-200 transition duration-200 {% if request.path == '/signup/' %}font-semibold{% endif %}">Signup</a>

        {% endif %}

        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="max-w-6xl mx-auto mt-8 px-4 pb-8">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
