{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl text-center text-red-700 mb-6">Donate Blood</h2>

<div class="flex justify-center">

    <form method="POST" class="bg-white shadow-lg p-6 rounded w-96">

        {% csrf_token %}

        {% if error %}
            <p class="text-red-600 mb-3 text-center">{{ error }}</p>
        {% endif %}

        <div class="mb-3">
            <label class="block mb-1">Units to Donate</label>
            <input 
                type="number" 
                name="units"
                class="w-full border px-3 py-2 rounded"
                required
            >
        </div>

        <div class="mb-4">
            <label class="block mb-1 font-medium">Select Donation Date</label>
            <input 
                type="date" 
                name="donation_date"
                class="w-full border px-3 py-2 rounded"
                required
            >
        </div>

        <button 
            class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700"
        >
            Submit Donation Request
        </button>

    </form>

</div>

{% endblock %}
