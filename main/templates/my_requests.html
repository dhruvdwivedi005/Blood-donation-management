{% extends 'base.html' %}

{% block content %}

<div class="bg-white shadow-xl rounded-lg overflow-hidden">

    <div class="bg-gradient-to-r from-primary to-secondary text-white p-6">
        <h2 class="text-2xl font-bold flex items-center">
            <i class="fas fa-clipboard-list mr-2"></i>My Blood Requests
        </h2>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full text-sm text-gray-700">

            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Request ID</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Blood Group</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Units</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                </tr>
            </thead>

            <tbody class="divide-y divide-gray-200">
            {% for row in data %}
                <tr class="hover:bg-gray-50 transition duration-200">

                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">{{ row.0 }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500">{{ row.3 }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500">{{ row.4 }}</td>

                    <td class="px-6 py-4 whitespace-nowrap">
                        {% if row.5 == "APPROVED" %}
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                <i class="fas fa-check-circle mr-1"></i>Approved
                            </span>
                        {% else %}
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                                <i class="fas fa-clock mr-1"></i>Pending
                            </span>
                        {% endif %}
                    </td>

                </tr>
            {% endfor %}
            </tbody>

        </table>
    </div>

</div>

{% endblock %}
