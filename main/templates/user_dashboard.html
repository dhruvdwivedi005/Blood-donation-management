{% extends 'base.html' %}

{% block content %}

<div class="text-center mb-8">
    <h2 class="text-3xl font-bold text-primary mb-2">User Dashboard</h2>
    <p class="text-gray-600">Manage your blood donations and requests</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

    <a href="/add-request/" class="group bg-gradient-to-br from-red-500 to-red-600 text-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-hand-holding-medical text-4xl text-red-200 group-hover:scale-110 transition-transform duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center">Request Blood</h3>
        <p class="text-red-100 text-center mt-2">Submit a blood request</p>
    </a>

    <a href="/add-donation/" class="group bg-gradient-to-br from-green-500 to-green-600 text-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-tint text-4xl text-green-200 group-hover:scale-110 transition-transform duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center">Donate Blood</h3>
        <p class="text-green-100 text-center mt-2">Make a donation</p>
    </a>

    <a href="/my-requests/" class="group bg-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 border-2 border-gray-100">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-clipboard-list text-4xl text-gray-400 group-hover:text-primary transition-colors duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center text-gray-800">My Requests</h3>
        <p class="text-gray-600 text-center mt-2">View your requests</p>
    </a>

    <a href="/my-donations/" class="group bg-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 border-2 border-gray-100">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-box text-4xl text-gray-400 group-hover:text-primary transition-colors duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center text-gray-800">My Donations</h3>
        <p class="text-gray-600 text-center mt-2">View your donations</p>
    </a>

</div>

{% endblock %}
