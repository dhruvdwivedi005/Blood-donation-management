<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-lg rounded-lg p-8 w-96">

    <h2 class="text-2xl font-bold text-center text-red-700 mb-6">
        Blood Management Login
    </h2>

    
    {% if error %}
    <div id="error-alert" class="fixed top-5 right-5 bg-red-600 text-white px-4 py-2 rounded shadow-lg z-50">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}

        <!-- Role Selection -->
        <div class="mb-4">
            <label class="block mb-1">Login As</label>
            <select name="role" class="w-full border px-3 py-2 rounded">
                <option value="user">User</option>
                <option value="hospital">Hospital</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="block mb-1">Contact</label>
            <input type="text" name="contact" class="w-full border px-3 py-2 rounded" required>
        </div>

        <div class="mb-4">
            <label class="block mb-1">Password</label>
            <input type="password" name="password" class="w-full border px-3 py-2 rounded" required>
        </div>

        <button class="w-full bg-red-700 text-white py-2 rounded hover:bg-red-800">
            Login
        </button>
    </form>

    <p class="text-center mt-4">
        New user? 
        <a href="/signup/" class="text-red-700 hover:underline">Create Account</a>
    </p>

</div>


<script>
    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(() => {
            const alert = document.getElementById('error-alert');
            console.log(alert)
        if (alert) {
            alert.style.opacity = '100%';
            let i = 100;
            const interval = setInterval(() => {
                i--;
                alert.style.opacity = i.toString() + '%'
            }, 15);
            setTimeout(() => {
                clearInterval(interval)
                alert.style.display = 'none'
            }, 15 * 100);
        }
    }, 1000);
});
</script>

</body>
</html>
