{% extends 'base.html' %}

{% block content %}

<div class="flex items-center justify-center min-h-[60vh]">

<div class="bg-white shadow-xl rounded-lg p-8 w-full max-w-md">

    <h2 class="text-3xl font-bold text-center text-primary mb-8 flex items-center justify-center">
        <i class="fas fa-sign-in-alt mr-2"></i>
        Blood Management Login
    </h2>

    
    {% if error %}
    <div id="error-alert" class="fixed top-20 right-5 bg-red-600 text-white px-4 py-3 rounded-lg shadow-lg z-50 border-l-4 border-red-800">
        <i class="fas fa-exclamation-triangle mr-2"></i>{{ error }}
    </div>
    {% endif %}
    
    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- Role Selection -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Login As</label>
            <select name="role" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200">
                <option value="user">User</option>
                <option value="hospital">Hospital</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Contact</label>
            <input type="text" name="contact" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input type="password" name="password" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200" required>
        </div>

        <button class="w-full bg-gradient-to-r from-primary to-secondary text-white py-3 rounded-lg hover:from-secondary hover:to-primary transition duration-300 shadow-lg font-semibold">
            <i class="fas fa-sign-in-alt mr-2"></i>Login
        </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
        New user? 
        <a href="/signup/" class="text-primary hover:text-secondary font-semibold transition duration-200">Create Account</a>
    </p>

</div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(() => {
            const alert = document.getElementById('error-alert');
            if (alert) {
                alert.style.opacity = '1';
                let i = 100;
                const interval = setInterval(() => {
                    i -= 2;
                    alert.style.opacity = i / 100;
                }, 30);
                setTimeout(() => {
                    clearInterval(interval);
                    alert.style.display = 'none';
                }, 30 * 100);
            }
        }, 1000);
    });
</script>

{% endblock %}
