{% extends 'base.html' %}

{% block content %}

<div class="flex items-center justify-center min-h-[60vh]">

<div class="bg-white shadow-xl rounded-lg p-8 w-full max-w-md">

    <h2 class="text-3xl font-bold text-center text-primary mb-8 flex items-center justify-center">
        <i class="fas fa-user-plus mr-2"></i>
        Create Account
    </h2>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
            <input class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200" 
                   type="text" name="name" placeholder="Name" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Blood Group</label>
            <input class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200" 
                   type="text" name="blood_group" placeholder="Blood Group" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Contact</label>
            <input class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200" 
                   type="text" name="contact" placeholder="Contact" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
            <input class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200" 
                   type="text" name="address" placeholder="Address">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 transition duration-200" 
                   type="password" name="password" placeholder="Password" required>
        </div>

        <button class="w-full bg-gradient-to-r from-primary to-secondary text-white py-3 rounded-lg hover:from-secondary hover:to-primary transition duration-300 shadow-lg font-semibold">
            <i class="fas fa-user-plus mr-2"></i>Sign Up
        </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
        Already have an account? 
        <a href="/login/" class="text-primary hover:text-secondary font-semibold transition duration-200">Login</a>
    </p>

</div>

</div>

{% endblock %}
