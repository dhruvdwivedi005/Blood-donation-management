{% extends 'base.html' %}

{% block content %}

<div class="bg-white shadow-xl rounded-lg overflow-hidden">

    <div class="bg-gradient-to-r from-primary to-secondary text-white p-6">
        <h2 class="text-2xl font-bold flex items-center">
            <i class="fas fa-chart-bar mr-2"></i>Blood Stock
        </h2>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full text-sm text-gray-700">

        <thead class="bg-gray-50">
        <tr>
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Blood Group</th>
            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Units Available</th>
        </tr>
        </thead>

        <tbody class="divide-y divide-gray-200">
        {% for row in data %}
        <tr class="hover:bg-gray-50 transition duration-200">
            <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">{{ row.0 }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-gray-500">{{ row.1 }}</td>
        </tr>
        {% endfor %}
        </tbody>

        </table>
    </div>

</div>

{% endblock %}
