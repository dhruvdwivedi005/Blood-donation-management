{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl text-red-700 mb-4">Blood Stock</h2>

<table class="min-w-full bg-white shadow rounded">

<thead class="bg-red-700 text-white">
<tr>
    <th>Blood Group</th>
    <th>Units Available</th>
</tr>
</thead>

<tbody>
{% for row in data %}
<tr class="text-center border-b">
    <td>{{ row.0 }}</td>
    <td>{{ row.1 }}</td>
</tr>
{% endfor %}
</tbody>

</table>

{% endblock %}
