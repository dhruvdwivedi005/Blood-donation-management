{% extends 'base.html' %}

{% block content %}

<div class="text-center mb-8">
    <h2 class="text-3xl font-bold text-primary mb-2">Hospital Dashboard</h2>
    <p class="text-gray-600">Manage blood requests, donations, and inventory</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

    <a href="/hospital-requests/" 
       class="group bg-gradient-to-br from-red-500 to-red-600 text-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-hand-holding-medical text-4xl text-red-200 group-hover:scale-110 transition-transform duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center">Manage Blood Requests</h3>
        <p class="text-red-100 text-center mt-2">Approve or view requests</p>
    </a>

    <a href="/hospital-donations/" 
       class="group bg-gradient-to-br from-green-500 to-green-600 text-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-tint text-4xl text-green-200 group-hover:scale-110 transition-transform duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center">Manage Donations</h3>
        <p class="text-green-100 text-center mt-2">Approve donations</p>
    </a>

    <a href="/blood-stock/" 
        class="group bg-gradient-to-br from-blue-500 to-blue-600 text-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-chart-bar text-4xl text-blue-200 group-hover:scale-110 transition-transform duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center">View Blood Stock</h3>
        <p class="text-blue-100 text-center mt-2">Check inventory levels</p>
    </a>

    <a href="/users/" 
    class="group bg-white p-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 border-2 border-gray-100">
        <div class="flex items-center justify-center mb-4">
            <i class="fas fa-users text-4xl text-gray-400 group-hover:text-primary transition-colors duration-300"></i>
        </div>
        <h3 class="text-xl font-semibold text-center text-gray-800">Active Volunteers</h3>
        <p class="text-gray-600 text-center mt-2">View registered users</p>
    </a>

</div>

{% endblock %}
